<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnolia — Commission Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root,[data-theme="light"]{
  --bg:#f5f3f0;--surface:#ffffff;--surface2:#f0edea;--border:#e0dbd5;
  --text:#1a1a1a;--muted:#6b6560;--heading:#056356;
  --teal:#056356;--teal-light:#0a7d6d;--teal-dark:#044a40;
  --pink:#D198B6;--pink-light:#e0b5cc;--pink-dark:#b87a9c;
  --green:#0d8050;--yellow:#b8860b;--red:#c0392b;
  --green-bg:rgba(13,128,80,.08);--yellow-bg:rgba(184,134,11,.08);--red-bg:rgba(192,57,43,.08);
  --green-text:#0d8050;--yellow-text:#8b6914;--red-text:#c0392b;
  --kpi-bg:#ffffff;--table-hover:#f9f7f5;--shadow:0 1px 3px rgba(0,0,0,.06);
  --toggle-bg:#e0dbd5;--toggle-dot:#ffffff;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2d3245;
  --text:#e4e6f0;--muted:#8b8fa3;--heading:#6dd8c8;
  --teal:#6dd8c8;--teal-light:#8ae4d6;--teal-dark:#4cc4b2;
  --pink:#D198B6;--pink-light:#e0b5cc;--pink-dark:#b87a9c;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --green-bg:rgba(34,197,94,.12);--yellow-bg:rgba(234,179,8,.12);--red-bg:rgba(239,68,68,.12);
  --green-text:#22c55e;--yellow-text:#eab308;--red-text:#ef4444;
  --kpi-bg:#1a1d27;--table-hover:#242836;--shadow:0 1px 3px rgba(0,0,0,.3);
  --toggle-bg:#4cc4b2;--toggle-dot:#0f1117;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.container{max-width:1440px;margin:0 auto;padding:24px 32px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{width:42px;height:42px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center}
.brand-mark svg{width:26px;height:26px}
.brand-text h1{font-size:1.5rem;font-weight:700;color:var(--heading);letter-spacing:-.02em}
.brand-text p{font-size:.8rem;color:var(--muted);font-weight:500}
.top-right{display:flex;align-items:center;gap:18px}
.updated-badge{font-size:.65rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-weight:500;display:none}
.updated-badge.visible{display:inline-block}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.theme-toggle span{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.toggle-track{width:44px;height:24px;background:var(--toggle-bg);border-radius:12px;position:relative;transition:.3s}
.toggle-dot{width:18px;height:18px;background:var(--toggle-dot);border-radius:50%;position:absolute;top:3px;left:3px;transition:.3s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
[data-theme="dark"] .toggle-dot{left:23px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);padding:4px;border-radius:10px;width:fit-content;box-shadow:var(--shadow)}
.tab{padding:10px 24px;border:none;background:none;color:var(--muted);font-family:inherit;font-size:.85rem;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s}
.tab.active{background:var(--teal);color:#fff}
.tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--kpi-bg);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);transition:background .3s}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600}
.kpi-value{font-size:1.4rem;font-weight:700;color:var(--heading)}
.kpi-delta{font-size:.7rem;margin-top:4px;font-weight:500}
.kpi-delta.up{color:var(--green-text)}.kpi-delta.down{color:var(--red-text)}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow);transition:background .3s}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:.9rem;font-weight:700;color:var(--heading)}
.search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:inherit;font-size:.8rem;width:240px;transition:background .3s}
.search:focus{outline:none;border-color:var(--teal)}
.filter-chips{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.75rem;font-family:inherit;font-weight:600;cursor:pointer;background:none;color:var(--muted);transition:.2s}
.chip.active{border-color:var(--teal);color:var(--teal);background:rgba(5,99,86,.08)}
.chip:hover:not(.active){border-color:var(--muted);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{background:var(--surface2);padding:10px 10px;text-align:center;font-weight:600;color:var(--muted);position:sticky;top:0;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap;transition:background .3s}
thead th:first-child{text-align:left;padding-left:20px}
thead th:hover{color:var(--text)}
thead th .arrow{font-size:.55rem;margin-left:2px;opacity:.4}
thead th.sorted .arrow{opacity:1;color:var(--teal)}
tbody td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--border)}
tbody td:first-child{text-align:left;font-weight:500;padding-left:20px}
tbody tr:hover{background:var(--table-hover)}
tbody tr.total-row{font-weight:700}
tbody tr.total-row td{border-top:2px solid var(--teal);background:var(--surface2)}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-weight:600;font-size:.72rem}
.pill.green{background:var(--green-bg);color:var(--green-text)}
.pill.yellow{background:var(--yellow-bg);color:var(--yellow-text)}
.pill.red{background:var(--red-bg);color:var(--red-text)}
.table-scroll{max-height:700px;overflow-y:auto}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);transition:background .3s}
.chart-card h3{font-size:.85rem;color:var(--muted);margin-bottom:12px;font-weight:600}
.chart-wrap{position:relative;height:320px}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--teal),var(--pink));border-radius:2px;margin-bottom:24px}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-banner{background:var(--red-bg);color:var(--red-text);padding:12px 20px;border-radius:8px;margin-bottom:20px;font-size:.8rem;font-weight:500;display:none}
.error-banner.visible{display:block}
@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>
<div class="container">
<div class="top-bar">
  <div class="brand">
    <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C9.5 5 5 7 5 12c0 4 3 8 7 10 4-2 7-6 7-10 0-5-4.5-7-7-10z" fill="#D198B6" opacity=".7"/><path d="M12 6c-1.5 2-4 3.5-4 6.5 0 2.5 1.8 5 4 6.5 2.2-1.5 4-4 4-6.5 0-3-2.5-4.5-4-6.5z" fill="white" opacity=".9"/></svg></div>
    <div class="brand-text">
      <h1>Magnolia</h1>
      <p id="subtitle">Commission Dashboard</p>
    </div>
  </div>
  <div class="top-right">
    <span class="updated-badge" id="updatedBadge"><span class="live-dot"></span>Updated <span id="updatedTime"></span></span>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="themeLabel">Light</span>
      <div class="toggle-track"><div class="toggle-dot"></div></div>
    </div>
  </div>
</div>
<div class="accent-bar"></div>
<div class="error-banner" id="errorBanner"></div>
<div class="tabs" id="monthTabs"></div>
<div id="monthView">
  <div id="kpis"></div>
  <div class="filter-chips" id="tierFilters">
    <button class="chip active" data-tier="all">All Agents</button>
    <button class="chip" data-tier="active">Active Only</button>
    <button class="chip" data-tier="85%+">85%+</button>
    <button class="chip" data-tier="80-84%">80-84%</button>
    <button class="chip" data-tier="75-79%">75-79%</button>
    <button class="chip" data-tier="70-74%">70-74%</button>
  </div>
  <div class="table-card">
    <div class="table-header"><h3 id="tableTitle">Agent Summary</h3><input class="search" id="searchInput" placeholder="Search agents..."></div>
    <div class="table-scroll"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  </div>
</div>
<div id="trendView" style="display:none">
  <div class="kpi-grid" id="trendKpis"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>Monthly Effectuated Apps</h3><div class="chart-wrap"><canvas id="trendAppsChart"></canvas></div></div>
    <div class="chart-card"><h3>Monthly CPA Trends</h3><div class="chart-wrap"><canvas id="trendCpaChart"></canvas></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>Cost Composition by Month</h3><div class="chart-wrap"><canvas id="trendCostChart"></canvas></div></div>
    <div class="chart-card"><h3>Agent Count & Avg Apps per Agent</h3><div class="chart-wrap"><canvas id="trendAgentChart"></canvas></div></div>
  </div>
</div>
</div>
<script>
var DATA = {};
var MONTHS = {};
var MONTH_KEYS = [];
var currentMonth = '';
var currentTier = 'all';
var searchTerm = '';
var sortCol = 'effectuated';
var sortDir = -1;
var charts = {};

var $ = function(s) { return document.querySelector(s); };
var $$ = function(s) { return document.querySelectorAll(s); };
var fmt = function(n) { return (n == null) ? '\u2014' : '$' + Math.round(n).toLocaleString(); };
var fmtN = function(n) { return (n == null) ? '\u2014' : Math.round(n).toLocaleString(); };

var API_BASE = 'https://mcc-ai-production.up.railway.app';
var DATA_JSON_URL = 'data.json';
var REFRESH_INTERVAL_MS = 3 * 60 * 60 * 1000;

function showError(msg) {
  var el = $('#errorBanner');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  $('#errorBanner').classList.remove('visible');
}

function setUpdatedTime(isoStr) {
  if (!isoStr) return;
  try {
    var d = new Date(isoStr);
    var opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
    $('#updatedTime').textContent = d.toLocaleDateString('en-US', opts);
    $('#updatedBadge').classList.add('visible');
  } catch (e) {}
}

function initFromPayload(payload) {
  DATA = payload.data;
  MONTHS = payload.meta.months;
  MONTH_KEYS = Object.keys(MONTHS);

  $('#subtitle').textContent = 'Commission Dashboard \u00B7 ' + payload.meta.quarter;
  document.title = 'Magnolia \u2014 Commission Dashboard ' + payload.meta.quarter;
  setUpdatedTime(payload.meta.generated_at);

  buildTabs();
  currentMonth = MONTH_KEYS[MONTH_KEYS.length - 1];
  $$('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.month === currentMonth);
  });
  render();
  hideError();
  $('#loadingOverlay').classList.add('hidden');
}

async function loadData() {
  try {
    var resp = await fetch(DATA_JSON_URL + '?t=' + Date.now());
    if (resp.ok) {
      var payload = await resp.json();
      if (payload.data && payload.meta) {
        initFromPayload(payload);
        return;
      }
    }
  } catch (e) {}

  try {
    var resp2 = await fetch(API_BASE + '/commissions/dashboard/data');
    if (resp2.ok) {
      var payload2 = await resp2.json();
      if (payload2.data && payload2.meta) {
        initFromPayload(payload2);
        return;
      }
    }
  } catch (e) {}

  showError('Could not load dashboard data. The data may not have been generated yet.');
  $('#loadingOverlay').classList.add('hidden');
}

function buildTabs() {
  var html = '';
  MONTH_KEYS.forEach(function(key) {
    html += '<button class="tab" data-month="' + key + '">' + MONTHS[key] + '</button>';
  });
  html += '<button class="tab" data-month="trend">Trend</button>';
  $('#monthTabs').innerHTML = html;

  $$('.tab').forEach(function(t) {
    t.addEventListener('click', function() {
      $$('.tab').forEach(function(b) { b.classList.remove('active'); });
      t.classList.add('active');
      currentMonth = t.dataset.month;
      render();
    });
  });
}

function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  $('#themeLabel').textContent = next === 'light' ? 'Light' : 'Dark';
  if (currentMonth === 'trend') renderTrend();
}

function summary(month) {
  var all = DATA[month] || [];
  var active = all.filter(function(a) { return a.effectuated > 0; });
  var tp = all.reduce(function(s, a) { return s + a.effectuated; }, 0);
  var tm = all.reduce(function(s, a) { return s + a.total_ma; }, 0);
  var tai = all.reduce(function(s, a) { return s + a.all_in_cost; }, 0);
  var ms = all.reduce(function(s, a) { return s + a.mktg_spend; }, 0);
  var sal = all.reduce(function(s, a) { return s + a.salary; }, 0);
  return {
    active: active.length, effectuated: tp, total_ma: tm, all_in: tai, mktg: ms, salary: sal,
    eff_rate: tm ? tp / tm : 0, mktg_cpa: tp ? ms / tp : 0, all_in_cpa: tp ? tai / tp : 0,
    rdr_cpa: tp ? tai / (tp * .7) : 0
  };
}

function renderKpis(month) {
  var s = summary(month);
  var prevKey = MONTH_KEYS[MONTH_KEYS.indexOf(month) - 1];
  var prev = prevKey ? summary(prevKey) : null;
  function delta(curr, p, invert) {
    if (!prev) return '';
    var d = curr - p;
    var pct = p ? ((d / p) * 100).toFixed(0) : '';
    var cls = (invert ? (d < 0) : (d > 0)) ? 'up' : 'down';
    var arrow = (invert ? (d < 0) : (d > 0)) ? '&#9650;' : '&#9660;';
    return '<div class="kpi-delta ' + cls + '">' + arrow + ' ' + Math.abs(Math.round(d)).toLocaleString() + ' (' + (pct > 0 ? '+' : '') + pct + '%) vs prev</div>';
  }
  var rawMktgCpa = s.total_ma ? s.mktg / s.total_ma : 0;
  var rawAllInCpa = s.total_ma ? s.all_in / s.total_ma : 0;
  var rawRdrCpa = s.total_ma ? s.all_in / (s.total_ma * .7) : 0;
  var totalCost = s.all_in;
  var totalPayout = s.all_in - s.mktg - s.salary;
  $('#kpis').innerHTML = '<div style="margin-bottom:6px"><div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);font-weight:700;margin-bottom:8px">Effectuated Metrics</div><div class="kpi-grid" style="margin-bottom:0">'
    + [
    { l: 'Active Agents', v: s.active, d: prev ? delta(s.active, prev.active, false) : '' },
    { l: 'Effectuated', v: fmtN(s.effectuated), d: prev ? delta(s.effectuated, prev.effectuated, false) : '' },
    { l: 'Effectuation Rate', v: Math.round(s.eff_rate * 100) + '%', d: '' },
    { l: 'Mktg CPA', v: fmt(s.mktg_cpa), d: prev ? delta(s.mktg_cpa, prev.mktg_cpa, true) : '' },
    { l: 'All-In CPA', v: fmt(s.all_in_cpa), d: prev ? delta(s.all_in_cpa, prev.all_in_cpa, true) : '' },
    { l: 'Projected RDR CPA', v: fmt(s.rdr_cpa), d: prev ? delta(s.rdr_cpa, prev.rdr_cpa, true) : '' },
  ].map(function(k) { return '<div class="kpi"><div class="kpi-label">' + k.l + '</div><div class="kpi-value">' + k.v + '</div>' + k.d + '</div>'; }).join('')
    + '</div></div>'
    + '<div style="margin-bottom:6px"><div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--pink-dark);font-weight:700;margin-bottom:8px">Raw Totals (All Deals Written)</div><div class="kpi-grid" style="margin-bottom:0">'
    + [
    { l: 'Total Deals', v: fmtN(s.total_ma), d: prev ? delta(s.total_ma, prev.total_ma, false) : '' },
    { l: 'Total Payout', v: fmt(totalPayout), d: '' },
    { l: 'Total Mktg Spend', v: fmt(s.mktg), d: prev ? delta(s.mktg, prev.mktg, true) : '' },
    { l: 'Total All-In Cost', v: fmt(totalCost), d: prev ? delta(totalCost, prev.all_in, true) : '' },
    { l: 'Raw All-In CPA', v: fmt(rawAllInCpa), d: prev ? delta(rawAllInCpa, prev.total_ma ? prev.all_in / prev.total_ma : 0, true) : '' },
    { l: 'Raw RDR CPA', v: fmt(rawRdrCpa), d: '' },
  ].map(function(k) { return '<div class="kpi"><div class="kpi-label">' + k.l + '</div><div class="kpi-value">' + k.v + '</div>' + k.d + '</div>'; }).join('')
    + '</div></div>';
}

function cpaPill(val, thresholds) {
  if (val == null || val === 0) return '<span class="pill">\u2014</span>';
  var v = Math.round(val);
  if (v <= thresholds[0]) return '<span class="pill green">' + fmt(v) + '</span>';
  if (v <= thresholds[1]) return '<span class="pill yellow">' + fmt(v) + '</span>';
  return '<span class="pill red">' + fmt(v) + '</span>';
}

var COLS = [
  { key: 'name', label: 'Agent', align: 'left' },
  { key: 'effectuated', label: 'Effectuated' },
  { key: 'total_ma', label: 'Total MA' },
  { key: 'eff_rate', label: 'Eff. Rate', fmt: function(v) { return v ? Math.round(typeof v === 'number' && v < 1 ? v * 100 : v) + '%' : '\u2014'; } },
  { key: 'per_policy', label: 'Per Policy', fmt: fmt },
  { key: 'payout', label: 'Payout', fmt: fmt },
  { key: 'mktg_spend', label: 'Mktg Spend', fmt: fmt },
  { key: 'salary', label: 'Salary', fmt: fmt },
  { key: 'all_in_cost', label: 'All-In Cost', fmt: fmt },
  { key: 'mktg_cpa', label: 'Mktg CPA', fmt: function(v) { return cpaPill(v, [99, 125]); } },
  { key: 'all_in_cpa', label: 'All-In CPA', fmt: function(v) { return cpaPill(v, [224, 275]); } },
  { key: 'proj_rdr_apps', label: 'RDR Apps' },
  { key: 'proj_rdr_cpa', label: 'RDR CPA', fmt: function(v) { return cpaPill(v, [400, 525]); } },
];

function filtered() {
  var d = DATA[currentMonth] || [];
  if (currentTier === 'active') d = d.filter(function(a) { return a.effectuated > 0; });
  else if (currentTier !== 'all') d = d.filter(function(a) { return a.tier === currentTier; });
  if (searchTerm) d = d.filter(function(a) { return a.name.toLowerCase().includes(searchTerm); });
  d.sort(function(a, b) { var va = a[sortCol], vb = b[sortCol]; if (typeof va === 'string') return sortDir * va.localeCompare(vb); return sortDir * ((va || 0) - (vb || 0)); });
  return d;
}

function renderTable() {
  var monthLabel = MONTHS[currentMonth] || currentMonth;
  var hdr = COLS.map(function(c) { var sorted = c.key === sortCol; var arrow = sorted ? (sortDir > 0 ? '&#9650;' : '&#9660;') : '&#8597;'; return '<th class="' + (sorted ? 'sorted' : '') + '" data-col="' + c.key + '" style="text-align:' + (c.align || 'center') + '">' + c.label + '<span class="arrow">' + arrow + '</span></th>'; }).join('');
  $('#thead').innerHTML = '<tr>' + hdr + '</tr>';
  var rows = filtered();
  var totals = { effectuated: 0, total_ma: 0, payout: 0, mktg_spend: 0, salary: 0, all_in_cost: 0, proj_rdr_apps: 0 };
  rows.forEach(function(r) { for (var k in totals) totals[k] += (r[k] || 0); });
  totals.eff_rate = totals.total_ma ? totals.effectuated / totals.total_ma : 0;
  totals.mktg_cpa = totals.effectuated ? totals.mktg_spend / totals.effectuated : 0;
  totals.all_in_cpa = totals.effectuated ? totals.all_in_cost / totals.effectuated : 0;
  totals.proj_rdr_cpa = totals.effectuated ? totals.all_in_cost / (totals.effectuated * .7) : 0;
  var html = rows.map(function(r) { var cells = COLS.map(function(c) { var v = r[c.key]; var display = c.fmt ? c.fmt(v) : (v != null ? v : '\u2014'); return '<td style="text-align:' + (c.align || 'center') + '">' + display + '</td>'; }).join(''); return '<tr>' + cells + '</tr>'; }).join('');
  var totalCells = COLS.map(function(c) { if (c.key === 'name') return '<td style="text-align:left;padding-left:20px">TOTAL</td>'; if (c.key === 'per_policy') return '<td></td>'; var v = totals[c.key]; var display = c.fmt ? c.fmt(v) : (v != null ? fmtN(v) : ''); return '<td style="text-align:center">' + display + '</td>'; }).join('');
  html += '<tr class="total-row">' + totalCells + '</tr>';
  $('#tbody').innerHTML = html;
  $('#tableTitle').textContent = monthLabel + ' \u2014 ' + rows.length + ' Agents';
}

function getChartColors() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    grid: dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)',
    tick: dark ? '#8b8fa3' : '#6b6560',
    teal: dark ? 'rgba(109,216,200,.7)' : 'rgba(5,99,86,.7)',
    pink: dark ? 'rgba(209,152,182,.7)' : 'rgba(209,152,182,.8)',
    blue: 'rgba(59,130,246,.7)', purple: 'rgba(168,85,247,.7)',
    orange: 'rgba(251,146,60,.7)', green: 'rgba(13,128,80,.7)'
  };
}

function renderTrend() {
  var labels = MONTH_KEYS.map(function(k) { return MONTHS[k]; });
  var sums = MONTH_KEYS.map(function(k) { return summary(k); });
  var cc = getChartColors();
  $('#trendKpis').innerHTML = [
    { l: 'Total Effectuated', v: fmtN(sums.reduce(function(s, m) { return s + m.effectuated; }, 0)) },
    { l: 'Total All-In Cost', v: fmt(sums.reduce(function(s, m) { return s + m.all_in; }, 0)) },
    { l: 'Avg All-In CPA', v: fmt(sums.reduce(function(s, m) { return s + m.all_in; }, 0) / sums.reduce(function(s, m) { return s + m.effectuated; }, 0)) },
    { l: 'Avg RDR CPA', v: fmt(sums.reduce(function(s, m) { return s + m.all_in; }, 0) / (sums.reduce(function(s, m) { return s + m.effectuated; }, 0) * .7)) },
    { l: 'Best Month (CPA)', v: labels[sums.indexOf(sums.reduce(function(a, b) { return a.all_in_cpa < b.all_in_cpa ? a : b; }))] },
    { l: 'Peak Agents', v: Math.max.apply(null, sums.map(function(s) { return s.active; })) },
  ].map(function(k) { return '<div class="kpi"><div class="kpi-label">' + k.l + '</div><div class="kpi-value">' + k.v + '</div></div>'; }).join('');
  if (charts.trendApps) charts.trendApps.destroy();
  charts.trendApps = new Chart($('#trendAppsChart'), { type: 'bar', data: { labels: labels, datasets: [
    { label: 'Effectuated', data: sums.map(function(s) { return s.effectuated; }), backgroundColor: cc.teal, borderRadius: 6 },
    { label: 'Total MA', data: sums.map(function(s) { return s.total_ma; }), backgroundColor: cc.pink, borderRadius: 6 },
  ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: cc.tick } } }, scales: { x: { ticks: { color: cc.tick }, grid: { display: false } }, y: { ticks: { color: cc.tick }, grid: { color: cc.grid } } } } });
  if (charts.trendCpa) charts.trendCpa.destroy();
  charts.trendCpa = new Chart($('#trendCpaChart'), { type: 'line', data: { labels: labels, datasets: [
    { label: 'Mktg CPA', data: sums.map(function(s) { return Math.round(s.mktg_cpa); }), borderColor: '#056356', backgroundColor: 'rgba(5,99,86,.1)', fill: true, tension: .3, pointRadius: 6 },
    { label: 'All-In CPA', data: sums.map(function(s) { return Math.round(s.all_in_cpa); }), borderColor: '#D198B6', backgroundColor: 'rgba(209,152,182,.1)', fill: true, tension: .3, pointRadius: 6 },
    { label: 'RDR CPA', data: sums.map(function(s) { return Math.round(s.rdr_cpa); }), borderColor: cc.orange, backgroundColor: 'rgba(251,146,60,.1)', fill: true, tension: .3, pointRadius: 6 },
  ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: cc.tick } } }, scales: { x: { ticks: { color: cc.tick }, grid: { display: false } }, y: { ticks: { color: cc.tick, callback: function(v) { return '$' + v; } }, grid: { color: cc.grid } } } } });
  if (charts.trendCost) charts.trendCost.destroy();
  charts.trendCost = new Chart($('#trendCostChart'), { type: 'bar', data: { labels: labels, datasets: [
    { label: 'Payout', data: sums.map(function(s) { return s.all_in - s.mktg - s.salary; }), backgroundColor: cc.teal, borderRadius: 4 },
    { label: 'Mktg Spend', data: sums.map(function(s) { return s.mktg; }), backgroundColor: cc.pink, borderRadius: 4 },
    { label: 'Salary', data: sums.map(function(s) { return s.salary; }), backgroundColor: cc.orange, borderRadius: 4 },
  ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: cc.tick } } }, scales: { x: { stacked: true, ticks: { color: cc.tick }, grid: { display: false } }, y: { stacked: true, ticks: { color: cc.tick, callback: function(v) { return '$' + Math.round(v / 1000) + 'k'; } }, grid: { color: cc.grid } } } } });
  if (charts.trendAgent) charts.trendAgent.destroy();
  charts.trendAgent = new Chart($('#trendAgentChart'), { type: 'bar', data: { labels: labels, datasets: [
    { label: 'Active Agents', data: sums.map(function(s) { return s.active; }), backgroundColor: cc.teal, borderRadius: 6, yAxisID: 'y' },
    { label: 'Avg Apps/Agent', data: sums.map(function(s) { return s.active ? Math.round(s.effectuated / s.active) : 0; }), type: 'line', borderColor: '#D198B6', pointBackgroundColor: '#D198B6', pointRadius: 6, yAxisID: 'y1' },
  ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: cc.tick } } }, scales: { x: { ticks: { color: cc.tick }, grid: { display: false } }, y: { position: 'left', ticks: { color: cc.tick }, grid: { color: cc.grid } }, y1: { position: 'right', ticks: { color: '#D198B6' }, grid: { display: false } } } } });
}

function render() {
  if (currentMonth === 'trend') {
    $('#monthView').style.display = 'none';
    $('#trendView').style.display = 'block';
    renderTrend();
  } else {
    $('#monthView').style.display = 'block';
    $('#trendView').style.display = 'none';
    renderKpis(currentMonth);
    renderTable();
  }
}

$$('.chip').forEach(function(c) {
  c.addEventListener('click', function() {
    $$('.chip').forEach(function(b) { b.classList.remove('active'); });
    c.classList.add('active');
    currentTier = c.dataset.tier;
    renderTable();
  });
});
$('#searchInput').addEventListener('input', function(e) { searchTerm = e.target.value.toLowerCase(); renderTable(); });
document.addEventListener('click', function(e) {
  if (e.target.closest('th[data-col]')) {
    var col = e.target.closest('th').dataset.col;
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
    renderTable();
  }
});

loadData();
setInterval(loadData, REFRESH_INTERVAL_MS);
</script>
</body>
</html>
