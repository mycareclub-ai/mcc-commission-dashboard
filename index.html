<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCareClub — Commission Dashboard Q1 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2d3245;--text:#e4e6f0;--muted:#8b8fa3;--accent:#6366f1;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--green-bg:rgba(34,197,94,.12);--yellow-bg:rgba(234,179,8,.12);--red-bg:rgba(239,68,68,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1440px;margin:0 auto;padding:24px}
h1{font-size:1.75rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:24px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);padding:4px;border-radius:10px;width:fit-content}
.tab{padding:10px 24px;border:none;background:none;color:var(--muted);font-size:.875rem;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:28px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-value{font-size:1.5rem;font-weight:700}
.kpi-delta{font-size:.75rem;margin-top:4px}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card h3{font-size:.875rem;color:var(--muted);margin-bottom:12px;font-weight:600}
.chart-wrap{position:relative;height:320px}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:.95rem;font-weight:600}
.search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:.85rem;width:260px}
.search:focus{outline:none;border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{background:var(--surface2);padding:10px 12px;text-align:center;font-weight:600;color:var(--muted);position:sticky;top:0;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap}
thead th:first-child{text-align:left}
thead th:hover{color:var(--text)}
thead th .arrow{font-size:.6rem;margin-left:3px;opacity:.4}
thead th.sorted .arrow{opacity:1;color:var(--accent)}
tbody td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--border)}
tbody td:first-child{text-align:left;font-weight:500}
tbody tr:hover{background:var(--surface2)}
tbody tr.total-row{background:var(--surface2);font-weight:700}
tbody tr.total-row td{border-top:2px solid var(--border)}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-weight:600;font-size:.75rem}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.yellow{background:var(--yellow-bg);color:var(--yellow)}
.pill.red{background:var(--red-bg);color:var(--red)}
.table-scroll{max-height:700px;overflow-y:auto}
.filter-chips{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.8rem;cursor:pointer;background:none;color:var(--muted);transition:.2s}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.1)}
.chip:hover:not(.active){border-color:var(--muted);color:var(--text)}
@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<h1>MyCareClub Commission Dashboard</h1>
<p class="subtitle">Q1 2026 — Agent Performance & CPA Analysis</p>

<div class="tabs" id="monthTabs">
  <button class="tab" data-month="jan">January</button>
  <button class="tab" data-month="feb">February</button>
  <button class="tab active" data-month="mar">March</button>
  <button class="tab" data-month="trend">Trend</button>

<div id="monthView">

    <div class="chart-card"><h3>Cost Breakdown — Top 20 Agents</h3><div class="chart-wrap"><canvas id="costChart"></canvas></div></div>
  </div>
  <div class="table-card">
    <div class="table-header">
      <h3 id="tableTitle">Agent Summary</h3>
      <input class="search" id="searchInput" placeholder="Search agents...">
    </div>
    <div class="table-scroll">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
</div>

<div id="trendView" style="display:none">
  <div class="kpi-grid" id="trendKpis"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>Monthly Effectuated Apps</h3><div class="chart-wrap"><canvas id="trendAppsChart"></canvas></div></div>
    <div class="chart-card"><h3>Monthly CPA Trends</h3><div class="chart-wrap"><canvas id="trendCpaChart"></canvas></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>Cost Composition by Month</h3><div class="chart-wrap"><canvas id="trendCostChart"></canvas></div></div>
    <div class="chart-card"><h3>Agent Count & Avg Apps per Agent</h3><div class="chart-wrap"><canvas id="trendAgentChart"></canvas></div></div>
  </div>
</div>
</div>

const MONTHS = {jan:'January',feb:'February',mar:'March'};
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmt = n => n==null?'—':'$'+Math.round(n).toLocaleString();
const fmtN = n => n==null?'—':Math.round(n).toLocaleString();

let currentMonth = 'mar';
let currentTier = 'all';
let searchTerm = '';
let sortCol = 'effectuated';
let sortDir = -1;
let charts = {};

function summary(month){
  const d = DATA[month].filter(a=>a.payable>0);
  const all = DATA[month];
  const tp = all.reduce((s,a)=>s+a.payable,0);
  const tm = all.reduce((s,a)=>s+a.total_ma,0);
  const tai = all.reduce((s,a)=>s+a.all_in_cost,0);
  const ms = all.reduce((s,a)=>s+a.mktg_spend,0);
  const sal = all.reduce((s,a)=>s+a.salary,0);
  return {active:d.length,payable:tp,total_ma:tm,all_in:tai,mktg:ms,salary:sal,
    pay_rate:tm?tp/tm:0,mktg_cpa:tp?ms/tp:0,all_in_cpa:tp?tai/tp:0,rdr_cpa:tp?tai/(tp*.7):0};
}

function renderKpis(month){
  const s = summary(month);
  const prev = month==='feb'?summary('jan'):month==='mar'?summary('feb'):null;
  const delta = (curr,p,invert)=>{
    if(!p) return '';
    const d = curr-p;
    const pct = p?((d/p)*100).toFixed(0):'';
    const cls = (invert?(d<0):(d>0))?'up':'down';
    const arrow = (invert?(d<0):(d>0))?'&#9650;':'&#9660;';
    return `<div class="kpi-delta ${cls}">${arrow} ${Math.abs(d).toLocaleString()} (${pct>0?'+':''}${pct}%) vs prev</div>`;
  };
  $('#kpis').innerHTML = [
    {l:'Active Agents',v:s.active,d:prev?delta(s.active,prev.active,false):''},
    {l:'Effectuated Apps',v:fmtN(s.payable),d:prev?delta(s.payable,prev.payable,false):''},
    {l:'Effectuation Rate',v:Math.round(s.pay_rate*100)+'%',d:''},
    {l:'Mktg CPA',v:fmt(s.mktg_cpa),d:prev?delta(s.mktg_cpa,prev.mktg_cpa,true):''},
    {l:'All-In CPA',v:fmt(s.all_in_cpa),d:prev?delta(s.all_in_cpa,prev.all_in_cpa,true):''},
    {l:'Projected RDR CPA',v:fmt(s.rdr_cpa),d:prev?delta(s.rdr_cpa,prev.rdr_cpa,true):''},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div>${k.d}</div>`).join('');
}

function cpaPill(val,thresholds){
  if(val==null||val===0) return '<span class="pill">—</span>';
  const v = Math.round(val);
  if(v<=thresholds[0]) return `<span class="pill green">${fmt(v)}</span>`;
  if(v<=thresholds[1]) return `<span class="pill yellow">${fmt(v)}</span>`;
  return `<span class="pill red">${fmt(v)}</span>`;
}

const COLS = [
  {key:'name',label:'Agent',align:'left'},
  {key:'effectuated',label:'Effectuated'},
  {key:'total_ma',label:'Total MA'},
  {key:'eff_rate',label:'Effectuation Rate',fmt:v=>v?Math.round(typeof v==='number'&&v<1?v*100:v)+'%':'—'},
  {key:'tier',label:'Tier'},
  {key:'per_policy',label:'Per Policy',fmt:fmt},
  {key:'payout',label:'Payout',fmt:fmt},
  {key:'mktg_spend',label:'Mktg Spend',fmt:fmt},
  {key:'salary',label:'Salary',fmt:fmt},
  {key:'all_in_cost',label:'All-In Cost',fmt:fmt},
  {key:'mktg_cpa',label:'Mktg CPA',fmt:v=>cpaPill(v,[99,125])},
  {key:'all_in_cpa',label:'All-In CPA',fmt:v=>cpaPill(v,[224,275])},
  {key:'proj_rdr_apps',label:'RDR Apps'},
  {key:'proj_rdr_cpa',label:'RDR CPA',fmt:v=>cpaPill(v,[400,525])},
];

function filtered(){
  let d = DATA[currentMonth];
  if(currentTier==='active') d=d.filter(a=>a.payable>0);
  else if(currentTier!=='all') d=d.filter(a=>a.tier===currentTier);
  if(searchTerm) d=d.filter(a=>a.name.toLowerCase().includes(searchTerm));
  d.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(typeof va==='string') return sortDir*va.localeCompare(vb);
    return sortDir*((va||0)-(vb||0));
  });
  return d;
}

function renderTable(){
  const hdr = COLS.map(c=>{
    const sorted = c.key===sortCol;
    const arrow = sorted?(sortDir>0?'&#9650;':'&#9660;'):'&#8597;';
    return `<th class="${sorted?'sorted':''}" data-col="${c.key}" style="text-align:${c.align||'center'}">${c.label}<span class="arrow">${arrow}</span></th>`;
  }).join('');
  $('#thead').innerHTML = `<tr>${hdr}</tr>`;

  const rows = filtered();
  const totals = {payable:0,total_ma:0,payout:0,mktg_spend:0,salary:0,all_in_cost:0,proj_rdr_apps:0};
  rows.forEach(r=>{for(const k in totals) totals[k]+=r[k]||0;});
  totals.pay_rate = totals.total_ma?totals.payable/totals.total_ma:0;
  totals.mktg_cpa = totals.payable?totals.mktg_spend/totals.payable:0;
  totals.all_in_cpa = totals.payable?totals.all_in_cost/totals.payable:0;
  totals.proj_rdr_cpa = totals.payable?totals.all_in_cost/(totals.payable*.7):0;

  let html = rows.map(r=>{
    const cells = COLS.map(c=>{
      let v = r[c.key];
      const display = c.fmt?c.fmt(v):(v!=null?v:'—');
      return `<td style="text-align:${c.align||'center'}">${display}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  const totalCells = COLS.map(c=>{
    if(c.key==='name') return '<td style="text-align:left">TOTAL</td>';
    if(c.key==='tier'||c.key==='per_policy') return '<td></td>';
    const v = totals[c.key];
    const display = c.fmt?c.fmt(v):(v!=null?fmtN(v):'');
    return `<td style="text-align:center">${display}</td>`;
  }).join('');
  html += `<tr class="total-row">${totalCells}</tr>`;

  $('#tbody').innerHTML = html;
  $('#tableTitle').textContent = `${MONTHS[currentMonth]} — ${rows.length} Agents`;
}

function renderCharts(){
  const rows = filtered().filter(a=>a.payable>0).slice(0,20);
  const labels = rows.map(r=>r.name.split(' ')[1]||r.name);

  if(charts.cpa) charts.cpa.destroy();
  charts.cpa = new Chart($('#cpaChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Mktg CPA',data:rows.map(r=>Math.round(r.mktg_cpa||0)),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4},
      {label:'All-In CPA',data:rows.map(r=>Math.round(r.all_in_cpa||0)),backgroundColor:'rgba(168,85,247,.7)',borderRadius:4},
      {label:'RDR CPA',data:rows.map(r=>Math.round(r.proj_rdr_cpa||0)),backgroundColor:'rgba(251,146,60,.7)',borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:11}}}},
      scales:{x:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#8b8fa3',callback:v=>'$'+v},grid:{color:'rgba(255,255,255,.06)'}}}}
  });

  if(charts.cost) charts.cost.destroy();
  charts.cost = new Chart($('#costChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Payout',data:rows.map(r=>r.payout),backgroundColor:'rgba(34,197,94,.7)',borderRadius:4},
      {label:'Mktg Spend',data:rows.map(r=>r.mktg_spend),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4},
      {label:'Salary',data:rows.map(r=>r.salary),backgroundColor:'rgba(251,146,60,.7)',borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:11}}}},
      scales:{x:{stacked:true,ticks:{color:'#8b8fa3',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{stacked:true,ticks:{color:'#8b8fa3',callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(255,255,255,.06)'}}}}
  });
}

function renderTrend(){
  const months = ['jan','feb','mar'];
  const labels = ['January','February','March'];
  const sums = months.map(summary);

  $('#trendKpis').innerHTML = [
    {l:'Q1 Total Effectuated',v:fmtN(sums.reduce((s,m)=>s+m.payable,0))},
    {l:'Q1 Total All-In Cost',v:fmt(sums.reduce((s,m)=>s+m.all_in,0))},
    {l:'Q1 Avg All-In CPA',v:fmt(sums.reduce((s,m)=>s+m.all_in,0)/sums.reduce((s,m)=>s+m.payable,0))},
    {l:'Q1 Avg RDR CPA',v:fmt(sums.reduce((s,m)=>s+m.all_in,0)/(sums.reduce((s,m)=>s+m.payable,0)*.7))},
    {l:'Best Month (CPA)',v:labels[sums.indexOf(sums.reduce((a,b)=>a.all_in_cpa<b.all_in_cpa?a:b))]},
    {l:'Peak Agents',v:Math.max(...sums.map(s=>s.active))},

  if(charts.trendCpa) charts.trendCpa.destroy();

    type:'line',
    data:{labels,datasets:[
      {label:'Mktg CPA',data:sums.map(s=>Math.round(s.mktg_cpa)),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:6},
      {label:'All-In CPA',data:sums.map(s=>Math.round(s.all_in_cpa)),borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,.1)',fill:true,tension:.3,pointRadius:6},
      {label:'RDR CPA',data:sums.map(s=>Math.round(s.rdr_cpa)),borderColor:'#fb923c',backgroundColor:'rgba(251,146,60,.1)',fill:true,tension:.3,pointRadius:6},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3'}}},
      scales:{x:{ticks:{color:'#8b8fa3'},grid:{display:false}},y:{ticks:{color:'#8b8fa3',callback:v=>'$'+v},grid:{color:'rgba(255,255,255,.06)'}}}}
  });

  if(charts.trendCost) charts.trendCost.destroy();
  charts.trendCost = new Chart($('#trendCostChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Payout',data:sums.map(s=>s.payable>0?sums[0].all_in-sums[0].mktg-sums[0].salary:0).map((_,i)=>sums[i].all_in-sums[i].mktg-sums[i].salary),backgroundColor:'rgba(34,197,94,.7)',borderRadius:4},
      {label:'Mktg Spend',data:sums.map(s=>s.mktg),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4},
      {label:'Salary',data:sums.map(s=>s.salary),backgroundColor:'rgba(251,146,60,.7)',borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3'}}},
      scales:{x:{stacked:true,ticks:{color:'#8b8fa3'},grid:{display:false}},y:{stacked:true,ticks:{color:'#8b8fa3',callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(255,255,255,.06)'}}}}
  });

  if(charts.trendAgent) charts.trendAgent.destroy();
  charts.trendAgent = new Chart($('#trendAgentChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Active Agents',data:sums.map(s=>s.active),backgroundColor:'rgba(99,102,241,.7)',borderRadius:6,yAxisID:'y'},
      {label:'Avg Apps/Agent',data:sums.map(s=>s.active?Math.round(s.payable/s.active):0),type:'line',borderColor:'#22c55e',pointRadius:6,yAxisID:'y1'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3'}}},
      scales:{x:{ticks:{color:'#8b8fa3'},grid:{display:false}},
              y:{position:'left',ticks:{color:'#8b8fa3'},grid:{color:'rgba(255,255,255,.06)'}},
              y1:{position:'right',ticks:{color:'#22c55e'},grid:{display:false}}}}
  });
}

function render(){
  if(currentMonth==='trend'){
    $('#monthView').style.display='none';
    $('#trendView').style.display='block';
    renderTrend();
  } else {
    $('#monthView').style.display='block';
    $('#trendView').style.display='none';
    renderKpis(currentMonth);
    renderTable();
    renderCharts();
  }
}

$$('.tab').forEach(t=>t.addEventListener('click',()=>{
  $$('.tab').forEach(b=>b.classList.remove('active'));
  t.classList.add('active');
  currentMonth=t.dataset.month;
  render();
}));

$$('.chip').forEach(c=>c.addEventListener('click',()=>{
  $$('.chip').forEach(b=>b.classList.remove('active'));
  c.classList.add('active');
  currentTier=c.dataset.tier;
  renderTable();renderCharts();
}));

$('#searchInput').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();renderTable();});

document.addEventListener('click',e=>{
  if(e.target.closest('th[data-col]')){
    const col=e.target.closest('th').dataset.col;
    if(sortCol===col) sortDir*=-1;
    else{sortCol=col;sortDir=-1;}
    renderTable();
  }
});

render();
</script>
</body>
</html>
